name: Build and Publish Docker Image

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".vscode/**"
      - ".github/**"
      - "!.github/workflows/**"
  pull_request:
    branches: ["main"]
  workflow_dispatch: # 允许手动触发

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker image version
        id: version
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');

          const packageFiles = ['server/package.json', 'web/package.json'];
          const versions = packageFiles.map((file) => ({
            file,
            version: JSON.parse(fs.readFileSync(file, 'utf8')).version
          }));

          const uniqueVersions = [...new Set(versions.map((item) => item.version))];
          if (uniqueVersions.length !== 1) {
            console.error('前后端 package.json 版本不一致，无法生成统一的 Docker 镜像版本号。');
            for (const item of versions) {
              console.error(`${item.file}: ${item.version}`);
            }
            process.exit(1);
          }

          const version = uniqueVersions[0];
          if (!/^\d+\.\d+\.\d+$/.test(version)) {
            console.error(`检测到非法语义化版本号: ${version}`);
            process.exit(1);
          }

          const [major, minor] = version.split('.');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `major_minor=${major}.${minor}\n`);
          NODE

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.major_minor }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: echo ${{ steps.meta.outputs.digest }}
